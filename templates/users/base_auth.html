<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crowd Heatmap{% endblock %}</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface: rgba(31, 40, 51, 0.65);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a8b2d1;
            --accent: #66fcf1;
            --accent-hover: #45a29e;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Background Orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        .bg-orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #0f3460, transparent 70%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1a1a2e, transparent 70%);
            bottom: -200px;
            right: -150px;
            animation-delay: -5s;
        }
        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #45a29e40, transparent 70%);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
            z-index: 10;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--text-main);
            overflow: hidden;
            animation: fadeUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Styling overrides for Auth */
        a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover {
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .brand-title {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #66fcf1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="auth-container">
        <div class="text-center mb-4">
            <a href="{% if user.is_authenticated %}{% url 'home' %}{% else %}{% url 'login' %}{% endif %}" class="text-decoration-none">
                <h3 class="mb-1 brand-title">Crowd Heatmap</h3>
                <small class="text-muted" style="font-weight: 300;">Discover the best location for your business</small>
            </a>
        </div>
        {% block auth_content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
